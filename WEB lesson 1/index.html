<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карточки для заданий</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-block">
        <h2 class="title">Домашние задания</h2>
        <p class="descr">Публикуй свои домашние задания или помогай решать другим</p>
        <div class="actions">
            <a href="#" class="lnk-blue">Опубликовать свое</a>
            <a href="#" class="lnk-blue">Помочь решить</a>
        </div>
    </div>

    <div class="main-block second">
        <h2 class="title">Мои задания</h2>
        <div class="list-wrap">
            <div class="row">
                <span class="line red"></span>
                <span class="txt">Математика</span>
                <span class="num">12</span>
            </div>
            <div class="row">
                <span class="line green"></span>
                <span class="txt">История</span>
                <span class="num">28</span>
            </div>
            <div class="row">
                <span class="line blue"></span>
                <span class="txt">Физика</span>
                <span class="num">2</span>
            </div>
        </div>
        <a href="#" class="orange-btn">Узнать подробнее</a>
    </div>
    <div class="main-block footer-nav">
        <a href="#" class="nav-item selected">Последние</a>
        <a href="#" class="nav-item">Популярные</a>
        <a href="#" class="nav-item">Решенные</a>
        <a href="#" class="nav-item">На проверке</a>
    </div>

</body>
</html>

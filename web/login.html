<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Войти | Game</title>
    <link rel="icon" type="image/png" href="img/check1.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <a href="index.html" class="logo" style="text-decoration: none;">LOGO</a>
            <nav>
                <ul>
                    <li><a href="index.html">Главная</a></li> <li><a href="about.html">О нас</a></li>
                    <li><a href="portfolio.html">Портофолио</a></li> 
                    <li><a href="news.html">Новости</a></li>
                    <li class="btn"><a href="login.html">Войти</a></li>
            </nav>
        </header>

        <main class="container login-content"> <div class="login-card">
                <h2>Войти</h2>
                
                <form class="needs-validation" novalidate>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email адрес</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                        <div class="invalid-feedback">Введите корректный email.</div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" minlength="6" placeholder="Минимум 6 символов" required>
                        <div class="invalid-feedback">Пароль должен быть не менее 6 символов.</div>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label text-light" for="remember" style="font-size: 14px;">Запомнить меня</label>
                    </div>

                    <button type="submit" class="btn-login">Продолжить</button>
                </form>

                <a href="index.html" class="back-link">← Вернуться на главную</a>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Скрипт для запрета отправки формы, если есть ошибки (Bootstrap Validation)
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
